version: "3.9"

services:

  # ── AuraBot Core ────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: aurabot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./assets:/app/assets:ro
      - ./sessions:/app/sessions
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - aura_net
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; asyncio.run(__import__('httpx').AsyncClient().get('http://localhost:8080/health'))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Queue Worker (scale horizontally) ────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: aurabot_worker
    restart: unless-stopped
    command: ["python", "-m", "workers.queue_worker", "worker-0"]
    env_file: .env
    depends_on:
      - redis
      - mongodb
    networks:
      - aura_net
    deploy:
      replicas: 1

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: aurabot_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - aura_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ───────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: aurabot_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: aurabot
    volumes:
      - mongo_data:/data/db
    networks:
      - aura_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Nginx Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: aurabot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - bot
    networks:
      - aura_net

  # ── Prometheus ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aurabot_prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - aura_net

  # ── Grafana ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: aurabot_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - aura_net


volumes:
  redis_data:
  mongo_data:
  prometheus_data:
  grafana_data:


networks:
  aura_net:
    driver: bridge
